- name: 专注收集 kernel_config 配置信息
        run: |
          cd src/$CONFIG_WORKDIR
          echo "【专注收集 kernel_config 配置信息】" | tee -a ../../$LOG_FILE
          
          # 准备配置文件所需的基础目录（关键修复）
          echo "创建必要的配置目录结构..." | tee -a ../../$LOG_FILE
          mkdir -p ./{arch/arm64/configs,configs,include/config,scripts/kconfig}
          touch arch/arm64/configs/oneplus_defconfig  # 模拟设备配置模板
          touch scripts/kconfig/conf  # 模拟配置工具
          
          # 记录初始配置文件状态
          find . -name "*.config" -o -name "defconfig" > pre_config_list.txt
          echo "初始配置文件列表:" | tee -a ../../$LOG_FILE
          cat pre_config_list.txt | tee -a ../../$LOG_FILE
          
          # 执行命令并捕获详细输出（含错误）
          echo "执行 kernel_config 命令..." | tee -a ../../$LOG_FILE
          ./main.bin "kernel_config" > config_output.txt 2>&1
          EXIT_CODE=$?
          echo "命令退出码: $EXIT_CODE" | tee -a ../../$LOG_FILE
          
          # 记录命令输出（核心配置信息可能在这里）
          echo "【kernel_config 命令输出】" | tee -a ../../$LOG_FILE
          cat config_output.txt | tee -a ../../$LOG_FILE
          
          # 查找生成的配置文件（核心目标）
          echo "【发现的配置文件】" | tee -a ../../$LOG_FILE
          find . -name "*.config" -o -name "defconfig" > post_config_list.txt
          cat post_config_list.txt | tee -a ../../$LOG_FILE
          
          # 提取所有配置文件内容（关键信息）
          echo "【完整配置文件内容】" | tee -a ../../$LOG_FILE
          for file in $(cat post_config_list.txt); do
            echo "===== 配置文件: $file =====" | tee -a ../../$LOG_FILE
            cat "$file" | tee -a ../../$LOG_FILE
            echo "===== 结束: $file =====" | tee -a ../../$LOG_FILE
          done
          
          # 对比配置文件变化（确认是否生成新配置）
          echo "【配置文件变化】" | tee -a ../../$LOG_FILE
          diff pre_config_list.txt post_config_list.txt | tee -a ../../$LOG_FILE
