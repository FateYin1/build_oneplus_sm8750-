name: Collect Kernel Config Info
on:
  workflow_dispatch:  # 手动触发，也可根据需求改成 push 等触发条件

jobs:
  collect_kernel_config:
    runs-on: ubuntu-latest
    env:
      REPO_URL: https://github.com/showdo/build_oneplus_sm8750.git
      LOG_FILE: kernel_config_collect.log
      MAIN_BIN_PATH: .github/workflows/Bin/main.bin
      CONFIG_WORKDIR: kernel_config_workdir

    steps:
      - name: 克隆仓库
        run: |
          git clone $REPO_URL .
          git pull
      - name: 创建工作目录
        run: mkdir -p $CONFIG_WORKDIR
      - name: 复制二进制文件
        run: cp $MAIN_BIN_PATH $CONFIG_WORKDIR/
      - name: 执行收集配置命令（示例，需结合实际命令调整）
        run: |
          cd $CONFIG_WORKDIR
          # 这里假设 main.bin 执行后能收集内核配置，实际命令根据工具逻辑调整
          ./main.bin > config_output.log 2>&1
          echo "内核配置信息收集完成，日志已写入 config_output.log"
      - name: 上传日志 artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config-logs
          path: $CONFIG_WORKDIR/config_output.log
          retention-days: 7  # 日志保留 7 天，可按需调整
