name: 仅设备信息收集专用工作流（完整版）
on:
  workflow_dispatch:

jobs:
  device_only_collect:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"
      DEVICES: "oneplus 13 oneplus ace5 pro oneplus 13t oneplus pad 2 pro oneplus pad 2 pro New oneplus ace5 ultra realme_GT7pro realme GT7pro Speed"
      LOG_FILE: "device_only_collect.log"
      MAIN_BIN_PATH: ".github/workflows/Bin/main.bin"

    steps:
      - name: 克隆仓库与初始化日志
        run: |
          git clone $REPO_URL src
          cd src
          git pull
          echo "===== 设备信息收集日志 =====" > $LOG_FILE
          echo "开始时间: $(date)" >> $LOG_FILE
          echo "收集设备列表: $DEVICES" >> $LOG_FILE
          echo "==========================" >> $LOG_FILE
          echo "" >> $LOG_FILE

      - name: 修复设备收集依赖安装
        run: |
          cd src
          echo "【修复版依赖安装】" | tee -a $LOG_FILE
          sudo apt update -y
          sudo apt install -y \
            strace file coreutils grep gawk pv \
            libc6-dev binutils 2>&1 | tee -a $LOG_FILE
          echo "工具验证:" | tee -a $LOG_FILE
          command -v strace && echo "strace可用" | tee -a $LOG_FILE || echo "strace缺失" | tee -a $LOG_FILE
          command -v gawk && echo "gawk可用" | tee -a $LOG_FILE || echo "gawk缺失" | tee -a $LOG_FILE
          command -v timeout && echo "timeout可用" | tee -a $LOG_FILE || echo "timeout缺失" | tee -a $LOG_FILE
          command -v ldd && echo "ldd可用" | tee -a $LOG_FILE || echo "ldd缺失" | tee -a $LOG_FILE
          echo "-------------------------" >> $LOG_FILE

      - name: 二进制文件前置检查
        run: |
          cd src
          echo "【main.bin前置检查】" | tee -a $LOG_FILE
          if [ ! -f "$MAIN_BIN_PATH" ]; then
            echo "::error::main.bin不存在！路径: $MAIN_BIN_PATH" | tee -a $LOG_FILE
            exit 1
          fi
          echo "main.bin存在: $(ls -la $MAIN_BIN_PATH)" | tee -a $LOG_FILE
          echo "文件类型检查:" | tee -a $LOG_FILE
          file "$MAIN_BIN_PATH" | tee -a $LOG_FILE
          if ! file "$MAIN_BIN_PATH" | grep -q "executable"; then
            echo "::error::main.bin不是可执行文件！" | tee -a $LOG_FILE
            exit 1
          fi
          if [ ! -x "$MAIN_BIN_PATH" ]; then
            echo "修复执行权限..." | tee -a $LOG_FILE
            chmod +x "$MAIN_BIN_PATH"
          fi
          echo "依赖库检查:" | tee -a $LOG_FILE
          ldd "$MAIN_BIN_PATH" 2>&1 | tee -a $LOG_FILE
          if ldd "$MAIN_BIN_PATH" 2>&1 | grep -q "not found"; then
            echo "警告: 存在缺失的依赖库！" | tee -a $LOG_FILE
          fi
          echo "-------------------------" >> $LOG_FILE

      - name: 激活设备收集循环（修复执行问题）
        run: |
          cd src
          echo "【激活设备收集循环】" | tee -a $LOG_FILE
          mkdir -p device_collect_fix && cd device_collect_fix
          cp ../"$MAIN_BIN_PATH" ./main.bin
          chmod +x main.bin
          echo "开始逐个处理设备..." | tee -a ../../$LOG_FILE
          set +e
          DEVICE_LIST=($DEVICES)
          for i in "${!DEVICE_LIST[@]}"; do
            device="${DEVICE_LIST[$i]}"
            echo "----- 处理设备[$((i+1))/8]: $device -----" | tee -a ../../$LOG_FILE
            echo "当前时间: $(date)" | tee -a ../../$LOG_FILE
            echo "执行: ./main.bin setup_device_info $device" | tee -a ../../$LOG_FILE
            timeout 30s strace -o "strace_$device.log" -e trace=open,write,setenv,execve \
              ./main.bin "setup_device_info" "$device" > device_out.txt 2>&1
            MAIN_EXIT=$?
            echo "退出码: $MAIN_EXIT" | tee -a ../../$LOG_FILE
            echo "二进制输出文本:" | tee -a ../../$LOG_FILE
            strings device_out.txt | tee -a ../../$LOG_FILE
            echo "系统调用记录:" | tee -a ../../$LOG_FILE
            grep -E "open.*O_WRONLY|write|setenv" "strace_$device.log" 2>/dev/null | tee -a ../../$LOG_FILE
            DEV_NAME="$device"
            DEV_MOD=$(echo "$device" | grep -oP '\d+' | head -n1)
            [ -z "$DEV_MOD" ] && DEV_MOD=$((i+1))
            echo "映射结果: DEVICES_NAME=$DEV_NAME, DEVICE_MOD=$DEV_MOD" | tee -a ../../$LOG_FILE
            rm device_out.txt "strace_$device.log"
            echo "-------------------------" >> ../../$LOG_FILE
          done
          set -e
          cd .. && rm -rf device_collect_fix
          echo "【设备循环执行完成】" | tee -a $LOG_FILE

      - name: 补全设备信息日志
        run: |
          cd src
          echo "【设备信息日志补全】" | tee -a $LOG_FILE
          echo "===== 完整设备映射表 =====" >> $LOG_FILE
          DEVICE_LIST=($DEVICES)
          for i in "${!DEVICE_LIST[@]}"; do
            device="${DEVICE_LIST[$i]}"
            DEV_MOD=$(echo "$device" | grep -oP '\d+' | head -n1)
            [ -z "$DEV_MOD" ] && DEV_MOD=$((i+1))
            echo "$device → DEVICES_NAME=$device, DEVICE_MOD=$DEV_MOD" | tee -a $LOG_FILE
          done
          echo "===== 收集验证 =====" >> $LOG_FILE
          if [ $(grep "映射结果:" $LOG_FILE | wc -l) -eq 8 ]; then
            echo "设备收集完整（8/8）" | tee -a $LOG_FILE
          else
            echo "警告: 设备收集不完整" | tee -a $LOG_FILE
          fi
          echo "最终完成时间: $(date)" >> $LOG_FILE

      - name: 上传设备信息日志
        uses: actions/upload-artifact@v4
        with:
          name: device-info-collect-results
          path: src/device_only_collect.log
          retention-days: 30
          if-no-files-found: error
