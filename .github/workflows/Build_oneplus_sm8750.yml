name: 增强版 setup_lz4 信息收集
on:
  workflow_dispatch:

jobs:
  collect_lz4_enhanced:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"
      LOG_FILE: "setup_lz4_enhanced.log"
      MAIN_BIN_PATH: ".github/workflows/Bin/main.bin"
      LZ4_WORKDIR: "lz4_workdir"

    steps:
      - name: 克隆仓库与初始化日志
        run: |
          git clone $REPO_URL src
          cd src
          git pull
          echo "===== 增强版 setup_lz4 收集日志 =====" > $LOG_FILE
          echo "开始时间: $(date)" >> $LOG_FILE
          echo "目标: 捕获 setup_lz4 的文件修改和输出" >> $LOG_FILE

      - name: 准备完整依赖与目录
        run: |
          cd src
          echo "【准备完整环境】" | tee -a $LOG_FILE
          # 安装额外调试工具
          sudo apt install -y tree 2>&1 | tee -a $LOG_FILE
          # 创建更贴近真实的内核目录结构
          mkdir -p $LZ4_WORKDIR/{lib/lz4,crypto,fs/f2fs,include/linux}
          # 创建必要的基础文件
          touch $LZ4_WORKDIR/lib/lz4/lz4_compress.c
          touch $LZ4_WORKDIR/fs/f2fs/compress.c
          touch $LZ4_WORKDIR/include/linux/compression.h
          # 复制二进制并授权
          cp $MAIN_BIN_PATH $LZ4_WORKDIR/main.bin
          chmod 755 $LZ4_WORKDIR/main.bin
          # 记录初始目录结构
          tree $LZ4_WORKDIR | tee -a $LOG_FILE

      - name: 执行 setup_lz4 并深度跟踪
        run: |
          cd src
          echo "【执行 setup_lz4 并跟踪】" | tee -a $LOG_FILE
          cd $LZ4_WORKDIR
          # 记录执行前文件哈希（精确检测变化）
          find . -type f -exec sha256sum {} \; > pre_sha.txt
          # 执行命令并捕获所有输出（含错误），增加超时保护
          timeout 60s strace -o lz4_strace.log ./main.bin "setup_lz4" > lz4_output.txt 2>&1
          EXIT_CODE=$?
          echo "执行退出码: $EXIT_CODE" | tee -a ../../$LOG_FILE
          # 记录执行后文件哈希
          find . -type f -exec sha256sum {} \; > post_sha.txt

          # 分析文件变化
          echo "【文件变化详情】" | tee -a ../../$LOG_FILE
          if ! diff pre_sha.txt post_sha.txt > /dev/null; then
            echo "检测到文件修改:" | tee -a ../../$LOG_FILE
            diff pre_sha.txt post_sha.txt | grep ">" | awk '{print $3}' | tee -a ../../$LOG_FILE
            # 输出修改文件的具体内容变化
            for file in $(diff pre_sha.txt post_sha.txt | grep ">" | awk '{print $3}'); do
              echo "----- $file 内容变化 -----" | tee -a ../../$LOG_FILE
              cat "$file" | tee -a ../../$LOG_FILE
            done
          else
            echo "未检测到文件修改" | tee -a ../../$LOG_FILE
          fi

          # 输出命令原始输出
          echo "【setup_lz4 输出内容】" | tee -a ../../$LOG_FILE
          if [ -s "lz4_output.txt" ]; then
            cat lz4_output.txt | tee -a ../../$LOG_FILE
          else
            echo "（无标准输出）" | tee -a ../../$LOG_FILE
          fi

          # 分析系统调用日志
          echo "【关键系统调用】" | tee -a ../../$LOG_FILE
          grep -E "open.*O_WRONLY|write|execve" lz4_strace.log | tee -a ../../$LOG_FILE

      - name: 提取 LZ4 相关配置
        run: |
          cd src
          echo "【LZ4 配置深度提取】" | tee -a $LOG_FILE
          cd $LZ4_WORKDIR
          # 搜索所有可能包含LZ4配置的文件
          echo "搜索 LZ4 相关代码片段:" | tee -a ../../$LOG_FILE
          grep -r -i "lz4" . 2>/dev/null | tee -a ../../$LOG_FILE
          # 检查压缩算法配置
          echo "搜索压缩算法定义:" | tee -a ../../$LOG_FILE
          grep -r -i "compression" . 2>/dev/null | tee -a ../../$LOG_FILE

      - name: 上传增强版日志
        uses: actions/upload-artifact@v4
        with:
          name: setup-lz4-enhanced-results
          path: src/setup_lz4_enhanced.log
          retention-days: 30
