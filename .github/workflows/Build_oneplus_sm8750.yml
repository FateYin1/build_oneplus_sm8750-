name: 设备信息收集最终可运行版
on:
  workflow_dispatch:

jobs:
  device_collect:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"
      DEVICES: "oneplus_13 oneplus_ace5_pro oneplus_13t oneplus_pad_2_pro oneplus_pad_2_pro_New oneplus_ace5_ultra realme_GT7pro realme_GT7pro_Speed"
      LOG_FILE: "device_collect.log"
      MAIN_BIN_PATH: ".github/workflows/Bin/main.bin"

    steps:
      - name: 克隆仓库
        run: |
          git clone $REPO_URL src
          cd src
          git pull

      - name: 初始化日志
        run: |
          cd src
          echo "===== 设备信息收集日志 =====" > $LOG_FILE
          echo "开始时间: $(date)" >> $LOG_FILE
          echo "设备列表: $DEVICES" >> $LOG_FILE

      - name: 安装依赖
        run: |
          cd src
          echo "【安装依赖】" | tee -a $LOG_FILE
          sudo apt update -y
          sudo apt install -y strace file coreutils grep gawk pv libc6-dev binutils

      - name: 检查二进制文件
        run: |
          cd src
          echo "【检查二进制文件】" | tee -a $LOG_FILE
          if [ ! -f "$MAIN_BIN_PATH" ]; then
            echo "::error::main.bin不存在" | tee -a $LOG_FILE
            exit 1
          fi
          chmod +x "$MAIN_BIN_PATH"
          file "$MAIN_BIN_PATH" | tee -a $LOG_FILE

      - name: 处理所有设备
        run: |
          cd src
          echo "【开始处理设备】" | tee -a $LOG_FILE
          mkdir -p workdir && cd workdir
          cp ../"$MAIN_BIN_PATH" ./main.bin
          chmod +x main.bin

          # 设备列表转为数组
          devices=($DEVICES)
          total=${#devices[@]}
          echo "共发现 $total 个设备" | tee -a ../../$LOG_FILE

          # 逐个处理设备
          for ((i=0; i<total; i++)); do
            device=${devices[$i]}
            echo "----- 处理设备 $((i+1))/$total: $device -----" | tee -a ../../$LOG_FILE
            
            # 执行命令并记录输出
            ./main.bin "setup_device_info" "$device" > output.txt 2>&1
            echo "执行结果: 退出码 $?" | tee -a ../../$LOG_FILE
            echo "输出内容:" | tee -a ../../$LOG_FILE
            cat output.txt | tee -a ../../$LOG_FILE
            
            # 生成映射信息
            dev_name=$device
            dev_mod=$(echo "$device" | grep -o '[0-9]\+' | head -1)
            if [ -z "$dev_mod" ]; then
              dev_mod=$((i+1))
            fi
            echo "映射信息: DEVICES_NAME=$dev_name, DEVICE_MOD=$dev_mod" | tee -a ../../$LOG_FILE
          done

          cd .. && rm -rf workdir

      - name: 生成最终映射表
        run: |
          cd src
          echo "【最终设备映射表】" | tee -a $LOG_FILE
          devices=($DEVICES)
          for ((i=0; i<${#devices[@]}; i++)); do
            device=${devices[$i]}
            dev_mod=$(echo "$device" | grep -o '[0-9]\+' | head -1)
            [ -z "$dev_mod" ] && dev_mod=$((i+1))
            echo "$device → $device:$dev_mod" | tee -a $LOG_FILE
          done

      - name: 上传日志
        uses: actions/upload-artifact@v4
        with:
          name: device-info-logs
          path: src/device_collect.log
