name: 收集二进制文件信息（云编译版）
on:
  workflow_dispatch:  # 支持手动触发

jobs:
  collect_info:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"  # 原仓库地址
      # 所有机型列表
      DEVICES: "oneplus_13 oneplus_ace5_pro oneplus_13t oneplus_pad_2_pro oneplus_pad_2_pro_New oneplus_ace5_ultra realme_GT7pro realme_GT7pro_Speed"

    steps:
      - name: 克隆原仓库最新代码
        run: |
          git clone $REPO_URL src
          cd src
          git pull  # 拉取最新版本
          echo "原仓库版本: $(git rev-parse --short HEAD)"

      - name: 设置工作目录与日志文件
        run: |
          cd src
          # 创建日志文件记录所有输出
          echo "===== 二进制文件信息收集日志 =====" > binary_info.log
          echo "运行时间: $(date)" >> binary_info.log
          echo "原仓库版本: $(git rev-parse --short HEAD)" >> binary_info.log
          echo "===================================" >> binary_info.log
          echo "" >> binary_info.log

      - name: 收集 main.bin "setup_lz4" 信息
        run: |
          cd src
          echo "【开始收集】main.bin setup_lz4" | tee -a binary_info.log
          
          # 创建模拟目录结构
          mkdir -p kernel_workspace/kernel_platform/common/lib/lz4
          cd kernel_workspace/kernel_platform/common
          
          # 执行setup_lz4命令
          cp ../../../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行命令: ./main.bin setup_lz4" >> ../../../binary_info.log
          ./main.bin "setup_lz4" 2>&1 | tee -a ../../../binary_info.log
          rm -f main.bin
          
          # 记录lz4目录文件变化
          echo "【文件变化】lib/lz4目录内容:" >> ../../../binary_info.log
          ls -la lib/lz4 >> ../../../binary_info.log
          echo "-------------------------" >> ../../../binary_info.log
          echo "" >> ../../../binary_info.log

      - name: 收集 main.bin "setup_suffix" 信息
        run: |
          cd src
          echo "【开始收集】main.bin setup_suffix" | tee -a binary_info.log
          
          # 先获取oneplus_13的DEVICE_MOD
          cp .github/workflows/Bin/main.bin ./
          chmod +x main.bin
          ./main.bin "setup_device_info" "oneplus_13" > /dev/null 2>&1
          MOD=$DEVICE_MOD  # 保存设备模块编号
          rm -f main.bin
          echo "使用DEVICE_MOD: $MOD" >> binary_info.log
          
          # 执行setup_suffix命令
          cp .github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行命令: ./main.bin setup_suffix $MOD" >> binary_info.log
          ./main.bin "setup_suffix" "$MOD" 2>&1 | tee -a binary_info.log
          rm -f main.bin
          
          # 记录内核配置变化
          echo "【配置变化】内核后缀设置:" >> binary_info.log
          grep "CONFIG_LOCALVERSION" kernel_workspace/kernel_platform/common/arch/arm64/configs/gki_defconfig >> binary_info.log 2>/dev/null
          echo "-------------------------" >> binary_info.log
      - name: 收集 main.bin "setup_lz4" 信息
        run: |
          cd src
          echo "【开始收集】main.bin setup_lz4" | tee -a binary_info.log
          
          # 创建模拟目录结构
          mkdir -p kernel_workspace/kernel_platform/common/lib/lz4
          cd kernel_workspace/kernel_platform/common
          
          # 执行setup_lz4命令
          cp ../../../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行命令: ./main.bin setup_lz4" >> ../../../binary_info.log
          ./main.bin "setup_lz4" 2>&1 | tee -a ../../../binary_info.log
          rm -f main.bin

      - name: 收集 main.bin "setup_lz4" 信息（修复目录缺失）
        run: |
          cd src
          echo "【开始收集】main.bin setup_lz4（修复目录结构）" | tee -a binary_info.log
          
          # 关键修复：同步真实内核源码目录结构（解决文件缺失）
          echo "同步内核源码目录结构..." | tee -a binary_info.log
          mkdir -p kernel_workspace
          cd kernel_workspace
          # 初始化并同步原内核源码（获取真实目录结构）
          repo init -u https://github.com/FateYin1/kernel_manifest.git -b refs/heads/oneplus/sm8750 -m oneplus_13.xml --depth=1
          repo sync -c -j$(nproc) --no-tags --force-sync > /dev/null 2>&1
          cd kernel_platform/common
          
          # 执行setup_lz4命令（在真实目录结构中）
          cp ../../../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行命令: ./main.bin setup_lz4" >> ../../../binary_info.log
          ./main.bin "setup_lz4" 2>&1 | tee -a ../../../binary_info.log
          rm -f main.bin
          
          # 记录lz4目录文件变化（重点关注修改的文件）
          echo "【文件变化】lib/lz4目录内容:" >> ../../../binary_info.log
          ls -la lib/lz4 >> ../../../binary_info.log
          echo "【文件变化】crypto目录lz4相关文件:" >> ../../../binary_info.log
          ls -la crypto/lz4* >> ../../../binary_info.log 2>/dev/null
          echo "【文件变化】f2fs压缩相关文件:" >> ../../../binary_info.log
          ls -la fs/f2fs/compress* >> ../../../binary_info.log 2>/dev/null
          echo "-------------------------" >> ../../../binary_info.log
          echo "" >> ../../../binary_info.log
      - name: 收集 main.bin "setup_suffix" 信息
        run: |
          cd src
          echo "【开始收集】main.bin setup_suffix" | tee -a binary_info.log
          
          # 先获取oneplus_13的DEVICE_MOD
          cp .github/workflows/Bin/main.bin ./
          chmod +x main.bin
          ./main.bin "setup_device_info" "oneplus_13" > /dev/null 2>&1
          MOD=$DEVICE_MOD  # 保存设备模块编号
          rm -f main.bin
          echo "使用DEVICE_MOD: $MOD" >> binary_info.log
          
          # 执行setup_suffix命令
          cp .github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行命令: ./main.bin setup_suffix $MOD" >> binary_info.log
          ./main.bin "setup_suffix" "$MOD" 2>&1 | tee -a binary_info.log
          rm -f main.bin
          
          # 记录内核配置变化
          echo "【配置变化】内核后缀设置:" >> binary_info.log
          grep "CONFIG_LOCALVERSION" kernel_workspace/kernel_platform/common/arch/arm64/configs/gki_defconfig >> binary_info.log 2>/dev/null
          echo "-------------------------" >> binary_info.log
      - name: 收集 setup.bin 信息
        run: |
          cd src
          echo "【开始收集】setup.bin" | tee -a binary_info.log
          
          # 创建模拟环境
          mkdir -p kernel_workspace/kernel_platform/KernelSU/kernel
          touch kernel_workspace/kernel_platform/KernelSU/kernel/Makefile  # 避免报错
          cd kernel_workspace/kernel_platform/KernelSU
          
          # 执行原setup.bin命令
          cp ../../../../.github/workflows/Bin/setup.bin ./
          chmod +x setup.bin
          echo "执行命令: ./setup.bin" >> ../../../../binary_info.log
          ./setup.bin 2>&1 | tee -a ../../../../binary_info.log
          rm -f setup.bin
          
          # 记录KSU版本变量
          echo "【环境变量】KSUVER: ${KSUVER:-未设置}" >> ../../../../binary_info.log
          echo "-------------------------" >> ../../../../binary_info.log

      - name: 上传收集到的日志
        uses: actions/upload-artifact@v4
        with:
          name: binary-info-log  # 日志名称
          path: src/binary_info.log  # 日志路径
          retention-days: 30  # 日志保留30天
