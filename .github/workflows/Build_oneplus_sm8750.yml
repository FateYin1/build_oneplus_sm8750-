name: 二进制文件全量信息收集
on:
  workflow_dispatch:

jobs:
  collect_binary:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"
      DEVICES: "oneplus_13 oneplus_ace5_pro oneplus_13t oneplus_pad_2_pro oneplus_pad_2_pro_New oneplus_ace5_ultra realme_GT7pro realme_GT7pro_Speed"
      LOG_FILE: "binary_full_info.log"

    steps:
      - name: 克隆原仓库代码
        run: |
          git clone $REPO_URL src
          cd src
          git pull
          echo "原仓库版本: $(git rev-parse --short HEAD)"
          
          # 初始化日志文件
          echo "===== 二进制信息收集日志 =====" > $LOG_FILE
          echo "运行时间: $(date)" >> $LOG_FILE
          echo "系统: $(lsb_release -d | cut -f2)" >> $LOG_FILE
          echo "仓库版本: $(git rev-parse --short HEAD)" >> $LOG_FILE
          echo "==========================" >> $LOG_FILE

      - name: 安装核心依赖工具
        run: |
          cd src
          echo "【安装依赖】" | tee -a $LOG_FILE
          
          # 安装基础工具
          sudo apt update -y
          sudo apt install -y curl git python3 strings pv unzip 2>&1 | tee -a $LOG_FILE
          
          # 验证关键工具
          echo "工具版本验证:" | tee -a $LOG_FILE
          strings --version | head -n1 | tee -a $LOG_FILE  # 用于提取二进制文本
          git --version | tee -a $LOG_FILE
          echo "-------------------------" >> $LOG_FILE
      - name: 收集 main.bin 设备映射信息
        run: |
          cd src
          echo "【设备信息收集】" | tee -a $LOG_FILE
          
          # 创建二进制专用测试目录
          mkdir -p bin_device_test && cd bin_device_test
          cp ../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          
          for device in $DEVICES; do
            echo "----- 机型: $device -----" | tee -a ../../$LOG_FILE
            # 捕获二进制完整输出
            ./main.bin "setup_device_info" "$device" > bin_out.txt 2>&1
            echo "main.bin 输出文本提取:" | tee -a ../../$LOG_FILE
            strings bin_out.txt | tee -a ../../$LOG_FILE  # 提取二进制中的文本
            
            # 提取设备名和模块编号
            DEV_NAME=$(strings bin_out.txt | grep -i "$device" | head -n1 | awk '{print $NF}')
            DEV_MOD=$(strings bin_out.txt | grep -i -E "mod|id|num" | grep -oP '\d+' | head -n1)
            
            # 兜底逻辑（无输出时）
            [ -z "$DEV_NAME" ] && DEV_NAME="$device"  # 用输入机型名兜底
            [ -z "$DEV_MOD" ] && DEV_MOD=$(echo "$device" | grep -oP '\d+' | head -n1)  # 提取数字
            [ -z "$DEV_MOD" ] && DEV_MOD=$(echo "$DEVICES" | tr ' ' '\n' | grep -n "^$device$" | cut -d: -f1)  # 用序号兜底
            
            # 记录映射关系
            echo "DEVICES_NAME: $DEV_NAME" >> ../../$LOG_FILE
            echo "DEVICE_MOD: $DEV_MOD" >> ../../$LOG_FILE
            echo "-------------------------" >> ../../$LOG_FILE
            rm bin_out.txt
          done
          
          cd .. && rm -rf bin_device_test  # 清理
          echo "" >> $LOG_FILE
      - name: 收集 main.bin setup_lz4 信息
        run: |
          cd src
          echo "【setup_lz4 信息收集】" | tee -a $LOG_FILE
          
          # 创建lz4测试目录结构
          mkdir -p bin_lz4_test/{lib/lz4,crypto,fs/f2fs} && cd bin_lz4_test
          cp ../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          
          # 执行lz4配置并捕获输出
          ./main.bin "setup_lz4" > lz4_out.txt 2>&1
          echo "setup_lz4 输出文本提取:" | tee -a ../../$LOG_FILE
          strings lz4_out.txt | tee -a ../../$LOG_FILE
          
          # 记录文件变化
          echo "lz4 相关文件变化:" | tee -a ../../$LOG_FILE
          find . -type f | grep -v "main.bin" | tee -a ../../$LOG_FILE  # 排除二进制本身
          # 查看关键目录内容
          echo "lib/lz4 目录内容:" | tee -a ../../$LOG_FILE
          ls -la lib/lz4 >> ../../$LOG_FILE 2>&1
          echo "crypto 目录内容:" | tee -a ../../$LOG_FILE
          ls -la crypto >> ../../$LOG_FILE 2>&1
          
          cd .. && rm -rf bin_lz4_test
          echo "-------------------------" >> $LOG_FILE
          echo "" >> $LOG_FILE
      - name: 收集 setup_suffix 与 setup.bin 信息
        run: |
          cd src
          echo "【setup_suffix 收集】" | tee -a $LOG_FILE
          
          # 收集 setup_suffix 信息
          mkdir -p bin_suffix_test && cd bin_suffix_test
          cp ../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          # 使用oneplus_13的MOD（从之前收集结果取）
          MOD=$(grep "oneplus_13" ../$LOG_FILE | grep "DEVICE_MOD" | awk '{print $2}')
          [ -z "$MOD" ] && MOD=13  # 兜底值
          ./main.bin "setup_suffix" "$MOD" > suffix_out.txt 2>&1
          echo "setup_suffix 输出提取:" | tee -a ../../$LOG_FILE
          strings suffix_out.txt | tee -a ../../$LOG_FILE
          cd .. && rm -rf bin_suffix_test
          
          # 收集 setup.bin 信息
          echo "【setup.bin 收集】" | tee -a $LOG_FILE
          mkdir -p bin_setup_test && cd bin_setup_test
          cp ../.github/workflows/Bin/setup.bin ./
          chmod +x setup.bin
          ./setup.bin > setup_out.txt 2>&1
          echo "setup.bin 输出提取:" | tee -a ../../$LOG_FILE
          strings setup_out.txt | tee -a ../../$LOG_FILE
          # 提取KSU版本
          KSU_VER=$(strings setup_out.txt | grep -i "ksuver" | grep -oP '\d+' | head -n1)
          echo "KSUVER: ${KSU_VER:-未获取}" >> ../../$LOG_FILE
          cd .. && rm -rf bin_setup_test
          
          echo "-------------------------" >> $LOG_FILE
      - name: 整理收集结果
        run: |
          cd src
          echo "【收集结果汇总】" | tee -a $LOG_FILE
          
          # 汇总设备映射表
          echo "===== 设备映射表 =====" >> $LOG_FILE
          grep -E "机型:|DEVICES_NAME|DEVICE_MOD" $LOG_FILE | tee -a $LOG_FILE
          
          # 汇总关键参数
          echo "===== 关键参数汇总 =====" >> $LOG_FILE
          grep -E "KSUVER|MOD" $LOG_FILE | tee -a $LOG_FILE
          
          echo "【收集完成】" | tee -a $LOG_FILE
          echo "日志大小: $(du -h $LOG_FILE | cut -f1)" | tee -a $LOG_FILE

      - name: 上传完整日志
        uses: actions/upload-artifact@v4
        with:
          name: binary-collection-results
          path: src/binary_full_info.log
          retention-days: 30
          if-no-files-found: error  # 日志缺失时标记失败
