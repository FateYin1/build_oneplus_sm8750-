- name: 执行setup_lz4并收集信息
        run: |
          cd src/$WORKDIR
          echo "【执行setup_lz4并监控】" | tee -a ../../$LOG_FILE

          # 安装依赖
          sudo apt-get update
          sudo apt-get install -y inotify-tools

          # 启动监控
          inotifywait -m -r -e modify,create,delete . > file_changes.log 2>&1 &
          INOTIFY_PID=$!
          echo "监控进程ID: $INOTIFY_PID" | tee -a ../../$LOG_FILE

          # 执行命令
          echo "执行: ./main.bin setup_lz4" | tee -a ../../$LOG_FILE
          timeout 60s ./main.bin "setup_lz4" > cmd_output.log 2>&1
          EXIT_CODE=$?
          echo "退出码: $EXIT_CODE" | tee -a ../../$LOG_FILE

          # 停止监控
          if ps -p $INOTIFY_PID > /dev/null; then
            kill $INOTIFY_PID
          fi

          # 记录文件变化
          echo "【文件变化】" | tee -a ../../$LOG_FILE
          if [ -s "file_changes.log" ]; then
            cat file_changes.log | tee -a ../../$LOG_FILE
          else
            echo "无文件变化" | tee -a ../../$LOG_FILE
          fi

          # 记录命令输出
          echo "【命令输出】" | tee -a ../../$LOG_FILE
          if [ -s "cmd_output.log" ]; then
            cat cmd_output.log | tee -a ../../$LOG_FILE
          else
            echo "无命令输出" | tee -a ../../$LOG_FILE
          fi
