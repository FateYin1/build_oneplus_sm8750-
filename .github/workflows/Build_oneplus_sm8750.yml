name: 设备信息收集完整修复版
on:
  workflow_dispatch:

jobs:
  device_collect:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"
      DEVICES: "oneplus_13 oneplus_ace5_pro oneplus_13t oneplus_pad_2_pro oneplus_pad_2_pro_New oneplus_ace5_ultra realme_GT7pro realme_GT7pro_Speed"
      LOG_FILE: "device_collect_fixed.log"
      MAIN_BIN_PATH: ".github/workflows/Bin/main.bin"

    steps:
      - name: 克隆仓库与初始化日志
        run: |
          git clone $REPO_URL src
          cd src
          git pull
          echo "===== 设备信息收集日志（修复版） =====" > $LOG_FILE
          echo "开始时间: $(date)" >> $LOG_FILE
          echo "设备总数: $(echo $DEVICES | wc -w)" >> $LOG_FILE
          echo "设备列表: $DEVICES" >> $LOG_FILE
          echo "==================================" >> $LOG_FILE

      - name: 确认依赖完整性
        run: |
          cd src
          echo "【依赖确认】" | tee -a $LOG_FILE
          # 验证所有必需工具
         必需工具=("strace" "file" "grep" "gawk" "timeout" "ldd" "strings")
          for tool in "${必需工具[@]}"; do
            if command -v $tool &> /dev/null; then
              echo "$tool: 已安装 ($(which $tool))" | tee -a $LOG_FILE
            else
              echo "::error::$tool 未安装！" | tee -a $LOG_FILE
              exit 1
            fi
          done
          echo "-------------------------" >> $LOG_FILE

      - name: 二进制文件深度检查
        run: |
          cd src
          echo "【二进制文件深度检查】" | tee -a $LOG_FILE
          
          # 确认文件存在
          if [ ! -f "$MAIN_BIN_PATH" ]; then
            echo "::error::main.bin不存在于路径: $MAIN_BIN_PATH" | tee -a $LOG_FILE
            exit 1
          fi
          
          # 确认文件大小合理（至少1KB）
          FILE_SIZE=$(stat -c%s "$MAIN_BIN_PATH")
          if [ $FILE_SIZE -lt 1024 ]; then
            echo "::warning::main.bin文件过小（$FILE_SIZE 字节），可能损坏" | tee -a $LOG_FILE
          fi
          
          # 强制设置执行权限
          chmod 755 "$MAIN_BIN_PATH"
          echo "权限设置: $(ls -la $MAIN_BIN_PATH)" | tee -a $LOG_FILE
          
          # 确认是可执行二进制
          if ! file "$MAIN_BIN_PATH" | grep -qE "executable|ELF"; then
            echo "::error::main.bin不是可执行二进制文件" | tee -a $LOG_FILE
            exit 1
          fi
          
          # 确认依赖库完整
          echo "依赖库验证:" | tee -a $LOG_FILE
          ldd "$MAIN_BIN_PATH" 2>&1 | tee -a $LOG_FILE
          if ldd "$MAIN_BIN_PATH" 2>&1 | grep -q "not found"; then
            echo "::error::存在缺失的依赖库！" | tee -a $LOG_FILE
            exit 1
          fi
          echo "-------------------------" >> $LOG_FILE

      - name: 强制激活设备收集循环
        run: |
          cd src
          echo "【强制激活设备收集循环】" | tee -a $LOG_FILE
          
          # 创建独立工作目录
          mkdir -p device_collect_workdir && cd device_collect_workdir
          cp ../"$MAIN_BIN_PATH" ./main.bin
          chmod 755 main.bin
          echo "工作目录: $(pwd)" | tee -a ../../$LOG_FILE
          echo "main.bin大小: $(stat -c%s main.bin) 字节" | tee -a ../../$LOG_FILE
          
          # 显式解析设备列表为数组（解决空格问题）
          echo "解析设备列表..." | tee -a ../../$LOG_FILE
          IFS=' ' read -ra DEVICE_ARRAY <<< "$DEVICES"
          echo "解析到的设备数量: ${#DEVICE_ARRAY[@]}" | tee -a ../../$LOG_FILE
          if [ ${#DEVICE_ARRAY[@]} -ne 8 ]; then
            echo "::error::设备列表解析错误，实际数量: ${#DEVICE_ARRAY[@]}" | tee -a ../../$LOG_FILE
            exit 1
          fi
          
          # 强制循环执行（添加详细调试）
          set +e  # 单个设备失败不中断
          PROCESSED=0
          for INDEX in "${!DEVICE_ARRAY[@]}"; do
            DEVICE="${DEVICE_ARRAY[$INDEX]}"
            echo "===== 开始处理设备 [$(($INDEX+1))/8]: $DEVICE =====" | tee -a ../../$LOG_FILE
            
            # 记录循环进入标记
            echo "循环已进入，当前设备索引: $INDEX" | tee -a ../../$LOG_FILE
            
            # 执行二进制并捕获所有输出
            echo "执行命令: ./main.bin setup_device_info $DEVICE" | tee -a ../../$LOG_FILE
            timeout 30s ./main.bin "setup_device_info" "$DEVICE" > output_$DEVICE.txt 2>&1
            EXIT_CODE=$?
            echo "执行退出码: $EXIT_CODE" | tee -a ../../$LOG_FILE
            
            # 输出二进制的实际输出（即使为空）
            echo "二进制输出内容:" | tee -a ../../$LOG_FILE
            if [ -s "output_$DEVICE.txt" ]; then
              cat "output_$DEVICE.txt" | tee -a ../../$LOG_FILE
            else
              echo "（无输出内容）" | tee -a ../../$LOG_FILE
            fi
            
            # 提取二进制中的文本信息
            echo "二进制内置文本片段:" | tee -a ../../$LOG_FILE
            strings main.bin | grep -i "$DEVICE" | tee -a ../../$LOG_FILE
            
            # 生成设备映射
            DEV_NAME="$DEVICE"
            DEV_MOD=$(echo "$DEVICE" | grep -oP '\d+' | head -n1)
            [ -z "$DEV_MOD" ] && DEV_MOD=$(($INDEX+1))  # 用索引作保底
            echo "设备映射: DEVICES_NAME=$DEV_NAME, DEVICE_MOD=$DEV_MOD" | tee -a ../../$LOG_FILE
            
            # 清理临时文件
            rm -f "output_$DEVICE.txt"
            PROCESSED=$((PROCESSED+1))
            echo "===== 设备 $DEVICE 处理完成 =====" | tee -a ../../$LOG_FILE
          done
          
          # 验证处理数量
          echo "实际处理设备数量: $PROCESSED" | tee -a ../../$LOG_FILE
          if [ $PROCESSED -ne 8 ]; then
            echo "::error::设备处理不完整，预期8个，实际$PROCESSED个" | tee -a ../../$LOG_FILE
          fi
          
          set -e  # 恢复错误中断
          cd .. && rm -rf device_collect_workdir
          echo "【设备收集循环执行结束】" | tee -a $LOG_FILE

      - name: 生成最终设备映射表
        run: |
          cd src
          echo "【最终设备映射表】" | tee -a $LOG_FILE
          echo "===== 可用设备信息汇总 =====" >> $LOG_FILE
          IFS=' ' read -ra DEVICE_ARRAY <<< "$DEVICES"
          for INDEX in "${!DEVICE_ARRAY[@]}"; do
            DEVICE="${DEVICE_ARRAY[$INDEX]}"
            DEV_MOD=$(echo "$DEVICE" | grep -oP '\d+' | head -n1)
            [ -z "$DEV_MOD" ] && DEV_MOD=$(($INDEX+1))
            echo "$DEVICE: DEVICES_NAME=$DEVICE, DEVICE_MOD=$DEV_MOD" | tee -a $LOG_FILE
          done
          echo "收集完成时间: $(date)" >> $LOG_FILE

      - name: 上传修复后日志
        uses: actions/upload-artifact@v4
        with:
          name: fixed-device-collect-logs
          path: src/device_collect_fixed.log
          retention-days: 30
          if-no-files-found: error
