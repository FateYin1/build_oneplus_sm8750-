name: 完整二进制信息收集（修复版）
on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      REPO_URL: "https://github.com/showdo/build_oneplus_sm8750.git"
      DEVICES: "oneplus_13 oneplus_ace5_pro oneplus_13t oneplus_pad_2_pro oneplus_pad_2_pro_New oneplus_ace5_ultra realme_GT7pro realme_GT7pro_Speed"
      LOG_FILE: "binary_info.log"

    steps:
      - name: 克隆原仓库并同步源码
        run: |
          # 克隆主仓库
          git clone $REPO_URL src
          cd src
          git pull
          echo "原仓库版本: $(git rev-parse --short HEAD)"
          
          # 初始化日志
          echo "===== 完整信息收集日志 =====" > $LOG_FILE
          echo "时间: $(date)" >> $LOG_FILE
          echo "仓库版本: $(git rev-parse --short HEAD)" >> $LOG_FILE
          echo "==========================" >> $LOG_FILE
          echo "" >> $LOG_FILE

      - name: 收集 main.bin setup_device_info（所有机型）
        run: |
          cd src
          echo "【设备信息收集开始】" | tee -a $LOG_FILE
          
          for device in $DEVICES; do
            echo "----- 机型: $device -----" | tee -a $LOG_FILE
            unset DEVICES_NAME DEVICE_MOD  # 重置变量
            
            # 执行设备配置
            cp .github/workflows/Bin/main.bin ./
            chmod +x main.bin
            echo "执行: ./main.bin setup_device_info $device" >> $LOG_FILE
            ./main.bin "setup_device_info" "$device" 2>&1 | tee -a $LOG_FILE
            rm main.bin
            
            # 记录关键变量
            echo "DEVICES_NAME: ${DEVICES_NAME:-未获取}" >> $LOG_FILE
            echo "DEVICE_MOD: ${DEVICE_MOD:-未获取}" >> $LOG_FILE
            echo "-------------------------" >> $LOG_FILE
          done
          echo "" >> $LOG_FILE
      - name: 收集 main.bin setup_lz4（修复目录结构）
        run: |
          cd src
          echo "【setup_lz4 收集开始】" | tee -a $LOG_FILE
          
          # 关键步骤：同步真实内核源码获取完整目录
          echo "同步内核源码获取目录结构..." | tee -a $LOG_FILE
          mkdir -p kernel_workspace && cd kernel_workspace
          # 同步oneplus_13的源码（包含完整目录）
          repo init -u https://github.com/FateYin1/kernel_manifest.git -b oneplus/sm8750 -m oneplus_13.xml --depth=1
          repo sync -c -j$(nproc) --no-tags --force-sync > sync.log 2>&1
          cd kernel_platform/common  # 进入源码目录
          
          # 执行lz4配置
          cp ../../../.github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行: ./main.bin setup_lz4" >> ../../../$LOG_FILE
          ./main.bin "setup_lz4" 2>&1 | tee -a ../../../$LOG_FILE
          rm main.bin
          
          # 记录文件变化
          echo "【lz4文件变化】" >> ../../../$LOG_FILE
          echo "lib/lz4目录:" >> ../../../$LOG_FILE
          ls -la lib/lz4 >> ../../../$LOG_FILE
          echo "crypto目录lz4文件:" >> ../../../$LOG_FILE
          ls -la crypto/lz4* >> ../../../$LOG_FILE 2>/dev/null
          echo "f2fs压缩相关文件:" >> ../../../$LOG_FILE
          ls -la fs/f2fs/compress* >> ../../../$LOG_FILE 2>/dev/null
          echo "-------------------------" >> ../../../$LOG_FILE
          echo "" >> ../../../$LOG_FILE
      - name: 收集 main.bin setup_suffix
        run: |
          cd src
          echo "【setup_suffix 收集开始】" | tee -a $LOG_FILE
          
          # 获取oneplus_13的DEVICE_MOD
          cp .github/workflows/Bin/main.bin ./
          chmod +x main.bin
          ./main.bin "setup_device_info" "oneplus_13" > /dev/null 2>&1
          MOD=$DEVICE_MOD
          rm main.bin
          echo "使用DEVICE_MOD: $MOD" | tee -a $LOG_FILE
          
          # 执行suffix配置
          cp .github/workflows/Bin/main.bin ./
          chmod +x main.bin
          echo "执行: ./main.bin setup_suffix $MOD" >> $LOG_FILE
          ./main.bin "setup_suffix" "$MOD" 2>&1 | tee -a $LOG_FILE
          rm main.bin
          
          # 记录内核配置变化
          echo "【内核后缀配置】" >> $LOG_FILE
          grep "CONFIG_LOCALVERSION" kernel_workspace/kernel_platform/common/arch/arm64/configs/gki_defconfig >> $LOG_FILE 2>/dev/null
          echo "-------------------------" >> $LOG_FILE
          echo "" >> $LOG_FILE

      - name: 收集 setup.bin 信息
        run: |
          cd src
          echo "【setup.bin 收集开始】" | tee -a $LOG_FILE
          
          # 准备KSU目录环境
          cd kernel_workspace/kernel_platform
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b susfs-main KernelSU  # 模拟KSU环境
          cd KernelSU
          touch kernel/Makefile  # 确保文件存在
          
          # 执行setup.bin
          cp ../../../.github/workflows/Bin/setup.bin ./
          chmod +x setup.bin
          echo "执行: ./setup.bin" >> ../../../$LOG_FILE
          ./setup.bin 2>&1 | tee -a ../../../$LOG_FILE
          rm setup.bin
          
          # 记录KSU版本
          echo "【KSU版本变量】" >> ../../../$LOG_FILE
          echo "KSUVER: ${KSUVER:-未获取}" >> ../../../$LOG_FILE
          echo "-------------------------" >> ../../../$LOG_FILE

      - name: 上传完整日志
        uses: actions/upload-artifact@v4
        with:
          name: complete-binary-info
          path: src/binary_info.log
          retention-days: 30  # 日志保留30天
